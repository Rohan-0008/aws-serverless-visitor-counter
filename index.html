<!DOCTYPE html>
<html>
<head>
    <title>AWS Visitor Counter</title>
</head>
<body>

<h1>Welcome to My AWS Serverless Visitor Counter</h1>

<h2 id="counter">Loading...</h2>

<script>

fetch("https://tzop43pd5f.execute-api.ap-south-1.amazonaws.com/count")
.then(response => response.json())
.then(data => {
    document.getElementById("counter").innerHTML =
        "Visitors: " + data.visitor_count;
});

</script>

</body>
</html>
